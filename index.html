<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto del Evento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📸 Foto del Evento</h1>
    <p>Toma una foto o graba un video y envíalo.</p>

    <input
        type="file"
        id="cameraInput"
        accept="image/*,video/*"
        capture
        hidden>

    <button id="takePhoto">
        Tomar foto / Video
    </button>

    <img id="imagePreview" style="display:none; width:100%; border-radius:15px; margin-top:20px;">

    <video
        id="videoPreview"
        controls
        style="display:none; width:100%; border-radius:15px; margin-top:20px;">
    </video>

    <button id="uploadBtn" disabled>
        Enviar
    </button>

    <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
