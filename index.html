<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto del Evento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📸 Evento</h1>
    <p>Elige una opción</p>

    <!-- FOTO -->
    <input
        type="file"
        id="photoInput"
        accept="image/*"
        capture="environment"
        hidden>

    <!-- VIDEO -->
    <input
        type="file"
        id="videoInput"
        accept="video/*"
        capture="environment"
        hidden>

    <button id="photoBtn">
        📷 Tomar Foto
    </button>

    <button id="videoBtn">
        🎥 Grabar Video
    </button>

    <img
        id="imagePreview"
        style="display:none;width:100%;margin-top:20px;border-radius:15px;">

    <video
        id="videoPreview"
        controls
        style="display:none;width:100%;margin-top:20px;border-radius:15px;">
    </video>

    <button id="uploadBtn" disabled>
        Enviar
    </button>

    <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
