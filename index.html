<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Toma una foto o graba un video y envíalo</h1>
    <p>Boda
    Rafael Ricardo y Lorna Yesenia</p>
    <p>15 de agosto de 2026</p>

    <!-- FOTO -->
    <input
        type="file"
        id="photoInput"
        accept="image/*"
        capture="environment"
        hidden>

    <!-- VIDEO -->
    <input
        type="file"
        id="videoInput"
        accept="video/*"
        capture="environment"
        hidden>

    <div class="button-row">

        <button id="photoBtn">
            📷<br>Tomar Foto
        </button>

        <button id="videoBtn">
            🎥<br>Grabar Video
        </button>

    </div>

    <img id="imagePreview">

    <video id="videoPreview" controls></video>

    <button id="uploadBtn" disabled>
        📤 Enviar
    </button>

    <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
