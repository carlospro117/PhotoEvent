<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto del Evento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📸 Foto del Evento</h1>
        <p>Tómate una foto y envíala.</p>

        <input
            type="file"
            id="cameraInput"
            accept="image/*"
            capture="environment"
            hidden>

        <button id="takePhoto">
            Tomar foto
        </button>

        <img id="preview" alt="Vista previa">

        <button id="uploadBtn" disabled>
            Enviar foto
        </button>

        <p id="status"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
